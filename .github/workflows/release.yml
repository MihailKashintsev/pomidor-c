name: Build Pomidor Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Версия релиза, например 0.4.0"
        required: true
        default: "0.4.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            asset: pomidor-windows-x64.zip
          - os: ubuntu-latest
            platform: linux
            arch: x64
            asset: pomidor-linux-x64.tar.gz
          - os: macos-13
            platform: macos
            arch: x64
            asset: pomidor-macos-x64.tar.gz
          - os: macos-14
            platform: macos
            arch: arm64
            asset: pomidor-macos-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v$VERSION"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          echo "POMIDOR_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: cmake -S . -B build -DPOMIDOR_VERSION=${{ env.POMIDOR_VERSION }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package/bin | Out-Null
          New-Item -ItemType Directory -Force -Path package/examples | Out-Null
          Copy-Item build/Release/pomidor.exe package/bin/pomidor.exe
          Copy-Item examples/*.pom package/examples/
          Copy-Item README.md package/
          Copy-Item LICENSE package/
          Compress-Archive -Path package/* -DestinationPath ${{ matrix.asset }} -Force
          Copy-Item scripts/install.ps1 install.ps1

      - name: Package Unix
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          mkdir -p package/bin package/examples
          cp build/pomidor package/bin/pomidor
          cp examples/*.pom package/examples/
          cp README.md package/
          cp LICENSE package/
          chmod +x package/bin/pomidor
          tar -czf "${{ matrix.asset }}" -C package .
          cp scripts/install.sh install.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Upload install.ps1 artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: install-ps1
          path: install.ps1

      - name: Upload install.sh artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: install-sh
          path: install.sh

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v$VERSION"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          echo "POMIDOR_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Pomidor ${{ env.POMIDOR_VERSION }}
          body: |
            Автоматический релиз Pomidor ${{ env.POMIDOR_VERSION }}.

            Установка Windows:
            ```powershell
            irm https://github.com/MihailKashintsev/pomidor-c/releases/latest/download/install.ps1 | iex
            ```

            Установка Linux/macOS:
            ```bash
            curl -fsSL https://github.com/MihailKashintsev/pomidor-c/releases/latest/download/install.sh | sh
            ```
          files: dist/*
          make_latest: true
