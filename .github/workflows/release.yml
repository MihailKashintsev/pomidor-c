name: Pomidor Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    name: Build Windows release for Pomidor IDE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            zip

      - name: Extract version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "POMIDOR_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION"

      - name: Build pomidor.exe
        shell: msys2 {0}
        run: |
          mkdir -p dist

          echo "Compiling Pomidor $POMIDOR_VERSION"

          gcc -std=c11 -O2 -Wall -Wextra \
            -I src \
            -finput-charset=UTF-8 \
            -fexec-charset=UTF-8 \
            -DPOMIDOR_VERSION=\"$POMIDOR_VERSION\" \
            src/*.c \
            -o dist/pomidor.exe

          ./dist/pomidor.exe --version || true

      - name: Create ZIP for Pomidor IDE
        shell: msys2 {0}
        run: |
          cd dist
          rm -f pomidor-windows-x64.zip
          zip pomidor-windows-x64.zip pomidor.exe

          echo "ZIP content:"
          unzip -l pomidor-windows-x64.zip

          unzip -l pomidor-windows-x64.zip | grep "pomidor.exe"

      - name: Upload artifact for debug
        uses: actions/upload-artifact@v4
        with:
          name: pomidor-windows-x64
          path: dist/pomidor-windows-x64.zip

      - name: Create GitHub Release and attach ZIP
        uses: softprops/action-gh-release@v2
        with:
          name: Pomidor ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            dist/pomidor-windows-x64.zip
          generate_release_notes: true
